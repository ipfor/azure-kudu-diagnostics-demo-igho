<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Azure Kudu Diagnostics Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 2rem;
            line-height: 1.5;
        }

        h1, h2 {
            margin-bottom: 0.5rem;
        }

        button {
            padding: 0.75rem 1.25rem;
            margin: 0.25rem;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #ccc;
            background: #f5f5f5;
            font-size: 1rem;
        }

            button:hover {
                background: #e5e5e5;
            }

        .buttons {
            margin-bottom: 1.5rem;
        }

        pre {
            background: #111;
            color: #eee;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 300px;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body>
    <h1>Azure Kudu Diagnostics Demo</h1>
    <p>
        Use the buttons below to trigger common problem patterns in the app.
        Then capture a diagnostic dump or profile the process in Kudu to see what is going on.
    </p>

    <div class="buttons">
        <h2>Scenarios</h2>

        <button onclick="callApi('/api/high-cpu')">
            High CPU spike (30s)
        </button>

        <button onclick="callApi('/api/memory-leak')">
            Memory leak (30s, ~1.2 GB max)
        </button>

        <button onclick="callApi('/api/memory-bomb')">
            One-off memory bomb (~512 MB)
        </button>

        <button onclick="callApi('/api/threadpool-starvation')">
            Thread pool starvation (200 tasks, 60s)
        </button>

        <button onclick="callApi('/api/health', 'GET')">
            Health check
        </button>
    </div>

    <h2>Last response</h2>
    <pre id="output"><code>Click a button to see the API response here.</code></pre>

    <script>
        async function callApi(path, method = 'POST', body) {
            const output = document.getElementById('output');
            output.textContent = 'Calling ' + method + ' ' + path + '...';

            const options = { method, headers: {} };

            if (body !== undefined && body !== null) {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(body);
            }

            const start = performance.now();

            try {
                const response = await fetch(path, options);
                const text = await response.text();
                const end = performance.now();
                const durationMs = Math.round(end - start);

                let parsed;
                try {
                    parsed = JSON.parse(text);
                } catch {
                    parsed = text;
                }

                const wrapped = {
                    path,
                    method,
                    durationMs,
                    response: parsed
                };

                output.textContent = JSON.stringify(wrapped, null, 2);
            } catch (err) {
                const end = performance.now();
                const durationMs = Math.round(end - start);

                const wrappedError = {
                    path,
                    method,
                    durationMs,
                    error: String(err)
                };

                output.textContent = JSON.stringify(wrappedError, null, 2);
            }
        }
    </script>
</body>
</html>
